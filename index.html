
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>Guardify | Enterprise Privacy Intelligence</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
          --brand-primary: #1e293b;
          --brand-action: #2563eb;
          --ui-surface: #ffffff;
          --ui-border: #e2e8f0;
          --ui-text: #0f172a;
        }
        
        body { 
          font-family: 'Plus Jakarta Sans', sans-serif; 
          background-color: #f8fafc;
          color: var(--ui-text);
          -webkit-font-smoothing: antialiased;
        }

        .code-font { font-family: 'JetBrains Mono', monospace; }

        .sidebar-blur {
          background: #0f172a;
        }

        .card-premium {
          background: white;
          border: 1px solid var(--ui-border);
          box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
          transition: all 0.2s ease-out;
        }

        .card-premium:hover {
          border-color: #cbd5e1;
          box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .btn-primary {
          background: var(--brand-action);
          transition: all 0.15s ease-in-out;
        }

        .btn-primary:hover {
          filter: brightness(0.95);
          box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .mesh-gradient {
          background-color: #f8fafc;
          background-image: 
            linear-gradient(to bottom right, rgba(241, 245, 249, 1), rgba(248, 250, 252, 1));
        }

        /* Professional Tooltips */
        [data-tooltip] {
          position: relative;
        }
        [data-tooltip]:before {
          content: attr(data-tooltip);
          position: absolute;
          bottom: 125%;
          left: 50%;
          transform: translateX(-50%) translateY(5px);
          padding: 6px 10px;
          background: #1e293b;
          color: white;
          font-size: 10px;
          font-weight: 600;
          border-radius: 4px;
          white-space: pre-wrap;
          width: max-content;
          max-width: 200px;
          text-align: center;
          opacity: 0;
          pointer-events: none;
          transition: all 0.1s ease;
          z-index: 100;
        }
        [data-tooltip]:hover:before {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .custom-scrollbar-dark::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar-dark::-webkit-scrollbar-thumb { background: #475569; }
    </style>
<script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react/": "https://esm.sh/react@^19.2.3/",

    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "jspdf": "https://esm.sh/jspdf@2.5.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="mesh-gradient min-h-screen">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
